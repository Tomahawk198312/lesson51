name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Flet CLI
        run: pip install flet

      - name: Build APK
        run: |
          flet build apk --module-name main --project-name "lesson51" --package-name "com.example.lesson51" --assets assets --android-min-sdk 21

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/android/app/build/outputs/apk/release/app-release.apk