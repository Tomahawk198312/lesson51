name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install flet python-dotenv requests

      - name: Ensure assets directory and create .env
        run: |
          mkdir -p assets
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" > assets/.env
          echo "BASE_URL=https://openrouter.ai/api/v1" >> assets/.env

      - name: Build APK
        run: yes | flet build apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/**/*.apk