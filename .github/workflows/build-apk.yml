name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install flet python-dotenv requests

      - name: Accept Android licenses
        run: |
          # Путь к Flutter, установленному Flet CLI
          FLUTTER_PATH=$HOME/flutter/3.41.7/bin/flutter
          yes | $FLUTTER_PATH doctor --android-licenses

      - name: Build APK
        run: echo "" | flet build apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/android/app/build/outputs/apk/release/app-release.apk